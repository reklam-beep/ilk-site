<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VetUsClub Okul Modülleri</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Ubuntu', sans-serif;
      background: #efefef;
    }

    .school-section {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 38px 40px;
    }

    .school-grid {
      display: grid;
      grid-template-columns: 230px 1fr 230px;
      gap: 34px;
      align-items: stretch;
    }

    /* SOL / SAĞ MODÜL KARTLARI */
    .side-card {
      position: relative;
      min-height: 360px;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      padding: 26px 20px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.16);
      text-decoration: none;
    }

    .side-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(1.03);
      transition: transform 0.35s ease;
    }

    .side-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(45, 12, 74, 0.78), rgba(95, 34, 148, 0.32));
    }

    .side-card:hover::before {
      transform: scale(1.08);
    }

    .side-card-content {
      position: relative;
      z-index: 2;
      color: #fff;
    }

    .side-card-title {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      line-height: 1.1;
    }

    .side-card-line {
      width: 62px;
      height: 6px;
      border-radius: 30px;
      background: #f4c400;
      margin-top: 14px;
    }

    .card-derslik::before {
      background-image:
        linear-gradient(rgba(101, 38, 155, 0.35), rgba(101, 38, 155, 0.35)),
        url('https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=900&q=80');
    }

    .card-atolye::before {
      background-image:
        linear-gradient(rgba(244, 196, 0, 0.22), rgba(244, 196, 0, 0.22)),
        url('https://images.unsplash.com/photo-1576086213369-97a306d36557?auto=format&fit=crop&w=900&q=80');
    }

    /* ORTA ALAN */
    .center-panel {
      position: relative;
      min-height: 360px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0,0,0,0.14);
      background:
        linear-gradient(rgba(255,255,255,0.06), rgba(255,255,255,0.06)),
        url('https://images.unsplash.com/photo-1588072432836-e10032774350?auto=format&fit=crop&w=1400&q=80');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .center-panel::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 36px;
      height: 10px;
      background: linear-gradient(
        to right,
        #f0c400 0%,
        #f0c400 68%,
        #6f14a4 68%,
        #6f14a4 100%
      );
      z-index: 0;
    }

    /* DUYURU PANOSU */
    .board {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 760px;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .notes-area {
      display: flex;
      gap: 70px;
      align-items: center;
      justify-content: center;
      width: 100%;
      flex-wrap: wrap;
    }

    .note {
      --rotate: 0deg;
      --floatX: 0px;
      --floatY: 0px;
      --liftY: 0px;
      position: relative;
      width: 190px;
      height: 270px;
      padding: 24px 18px;
      text-align: center;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(0,0,0,0.01) 0px,
          rgba(0,0,0,0.01) 1px,
          rgba(255,255,255,0.02) 2px,
          rgba(255,255,255,0.02) 4px
        ),
        linear-gradient(180deg, #ffffff 0%, #f2f2f2 100%);
      box-shadow: 0 14px 20px rgba(0,0,0,0.16);
      transform: rotate(var(--rotate)) translate(var(--floatX), calc(var(--floatY) + var(--liftY)));
      transition: transform .25s ease, box-shadow .25s ease;
      cursor: pointer;
      transform-origin: top center;
    }

    .note:hover {
      --liftY: -8px;
      box-shadow: 0 20px 28px rgba(0,0,0,0.2);
      animation: wobble .9s ease-in-out infinite alternate;
    }

    @keyframes wobble {
      0% {
        transform: rotate(calc(var(--rotate) - 1.2deg)) translate(var(--floatX), calc(var(--floatY) + var(--liftY)));
      }
      100% {
        transform: rotate(calc(var(--rotate) + 1.2deg)) translate(var(--floatX), calc(var(--floatY) + var(--liftY)));
      }
    }

    .pin {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      border-radius: 50%;
      box-shadow:
        inset -2px -2px 4px rgba(0,0,0,0.25),
        inset 2px 2px 3px rgba(255,255,255,0.6),
        0 4px 6px rgba(0,0,0,0.2);
    }

    .pin::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 22px;
      background: #666;
      left: 50%;
      top: 12px;
      transform: translateX(-50%) rotate(5deg);
      border-radius: 2px;
    }

    .pin-white { background: #f3f3f3; }
    .pin-purple { background: #7b4edb; }
    .pin-orange { background: #c68034; }
    .pin-red { background: #c94c4c; }
    .pin-gold { background: #caa43b; }

    .note h2 {
      font-size: 18px;
      margin: 18px 0 10px;
      font-weight: 700;
      line-height: 1.2;
      color: #2f2f2f;
    }

    .note p {
      font-size: 13px;
      line-height: 1.45;
      color: #555;
      margin-bottom: 16px;
    }

    .btn {
      display: inline-block;
      background: #7447bb;
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 6px 14px rgba(116,71,187,0.3);
      transition: background .2s ease, transform .2s ease;
    }

    .btn:hover {
      background: #6136a4;
      transform: translateY(-1px);
    }

    /* MOBİL */
    @media (max-width: 1100px) {
      .school-grid {
        grid-template-columns: 1fr;
      }

      .side-card {
        min-height: 240px;
      }

      .center-panel {
        min-height: auto;
        padding: 26px 12px 30px;
      }

      .center-panel::after {
        bottom: 22px;
      }
    }

    @media (max-width: 768px) {
      .school-section {
        padding: 18px 14px 28px;
      }

      .notes-area {
        flex-direction: column;
        gap: 22px;
      }

      .note {
        width: 155px;
        height: 190px !important;
        padding: 14px 10px;
      }

      .note h2 {
        font-size: 11px;
        margin: 10px 0 7px;
        line-height: 1.15;
      }

      .note p {
        font-size: 9px;
        line-height: 1.28;
        margin-bottom: 10px;
      }

      .btn {
        font-size: 9px;
        padding: 6px 10px;
      }

      .pin {
        width: 11px;
        height: 11px;
        top: -10px;
      }

      .pin::after {
        height: 15px;
        top: 8px;
      }

      .side-card-title {
        font-size: 24px;
      }
    }

    /* TOPBAR (Ana sayfadaki gibi: ikon + dark mode) */
    .topbar {
      width: 100%;
      max-width: 1440px;
      margin: 26px auto 26px;
      background: #f8f8f8;
      border-radius: 28px;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.07);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 22px;
      color: #5f0aa7;
    }

    .logo-plus {
      width: 18px;
      height: 18px;
      position: relative;
      display: inline-block;
    }

    .logo-plus::before,
    .logo-plus::after {
      content: "";
      position: absolute;
      background: #f2c300;
      border-radius: 4px;
    }

    .logo-plus::before {
      width: 18px;
      height: 6px;
      top: 6px;
      left: 0;
    }

    .logo-plus::after {
      width: 6px;
      height: 18px;
      top: 0;
      left: 6px;
    }

    .logo span.small {
      color: #f2c300;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      border: 2px solid #6a0dad;
      background: #fff;
      color: #6a0dad;
      border-radius: 999px;
      height: 52px;
      width: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      position: relative;
    }

    .notif {
      position: absolute;
      top: -6px;
      right: -4px;
      background: #e05555;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* ÜYE KARŞILAMA (Ana sayfadaki gibi) */
    .welcome-card {
      background: #f8f8f8;
      border-radius: 30px;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.08);
      padding: 38px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 38px;
    }

    .welcome-text h1 {
      font-size: 34px;
      line-height: 1.2;
      margin-bottom: 16px;
      font-weight: 800;
    }

    .welcome-text p {
      font-size: 26px;
      color: #666;
      font-style: italic;
    }

    .profile-btn {
      background: #6a0dad;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 18px 42px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 22px rgba(106, 13, 173, 0.22);
      white-space: nowrap;
    }

    /* Dark mode */
    body.dark {
      background: #252525;
      color: #e6e6e6;
    }

    body.dark .topbar {
      background: #2f2f2f;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    body.dark .icon-btn {
      background: #252525;
      color: #6a0dad;
    }

    body.dark .welcome-card {
      background: #2f2f2f;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.4);
    }

    body.dark .welcome-text p {
      color: #bdbdbd;
    }

    body.dark .note {
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 1px,
          rgba(0,0,0,0.02) 2px,
          rgba(0,0,0,0.02) 4px
        ),
        linear-gradient(180deg, #1b1b1b 0%, #101010 100%);
      box-shadow: 0 14px 20px rgba(0, 0, 0, 0.55);
    }

    body.dark .note h2 {
      color: #f1f1f1;
    }

    body.dark .note p {
      color: #bdbdbd;
    }

    @media (max-width: 768px) {
      .topbar {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }

      .welcome-card {
        flex-direction: column;
        align-items: flex-start;
        padding: 24px;
      }

      .profile-btn {
        align-self: flex-start;
      }

      .welcome-text h1 {
        font-size: 28px;
      }

      .welcome-text p {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="logo">
      <span class="logo-plus"></span>
      <span><span class="small">vetus</span>club</span>
    </div>

    <div class="top-actions">
      <button class="icon-btn" aria-label="Gece modu" type="button">
        ☾
        <span class="notif">2</span>
      </button>
    </div>
  </header>

  <section class="school-section">
    <section class="welcome-card">
      <div class="welcome-text">
        <h1>VetUsClub'a Hoş Geldiniz, Üye</h1>
        <p>Modülleri görüntülemek için profil bilgilerinizi güncelleyiniz.</p>
      </div>
      <button class="profile-btn" type="button">Profil Bilgilerim</button>
    </section>

    <div class="school-grid">

      <!-- SOL KART -->
      <a href="https://www.vetusclub.com.tr" class="side-card card-derslik">
        <div class="side-card-content">
          <h3 class="side-card-title">Derslik</h3>
          <div class="side-card-line"></div>
        </div>
      </a>

      <!-- ORTA DUYURU PANOSU -->
      <div class="center-panel">
        <div class="board">
          <div class="notes-area" id="notesArea"></div>
        </div>
      </div>

      <!-- SAĞ KART -->
      <a href="https://www.vetusclub.com.tr" class="side-card card-atolye">
        <div class="side-card-content">
          <h3 class="side-card-title">Atölye</h3>
          <div class="side-card-line"></div>
        </div>
      </a>

    </div>
  </section>

  <script>
    (function () {
      // Dark mode: Ay ikonuna tıklanınca aç/kapat + tercih sakla.
      const themeKey = "theme";
      const applyTheme = (theme) => {
        const isDark = theme === "dark";
        document.body.classList.toggle("dark", isDark);
      };

      const savedTheme = localStorage.getItem(themeKey);
      if (savedTheme === "dark") applyTheme("dark");

      const themeBtn =
        document.querySelector('button.icon-btn[aria-label="Gece modu"]') ||
        document.querySelector("button.icon-btn");

      if (themeBtn) {
        themeBtn.addEventListener("click", () => {
          const nextTheme = document.body.classList.contains("dark") ? "light" : "dark";
          applyTheme(nextTheme);
          localStorage.setItem(themeKey, nextTheme);
          themeBtn.setAttribute(
            "aria-label",
            nextTheme === "dark" ? "Aydınlık modu" : "Gece modu"
          );
        });
      }
    })();

    const pinColors = [
      "pin-white",
      "pin-purple",
      "pin-orange",
      "pin-red",
      "pin-gold"
    ];

    const rotateValues = [-7, -5, -3, 3, 5, 7];
    const heightValues = [258, 266, 274, 282];

    function randomPinColor() {
      return pinColors[Math.floor(Math.random() * pinColors.length)];
    }

    function randomRotate() {
      return rotateValues[Math.floor(Math.random() * rotateValues.length)];
    }

    function randomHeight() {
      return heightValues[Math.floor(Math.random() * heightValues.length)];
    }

    const notes = [
      {
        title: "Yeni Eğitim Videosu Yayında!",
        text: "Doç. Dr. Mert Polat'ın sunumları ile yeni eğitim içeriğimizi hemen izleyebilirsiniz.",
        button: "Eğitime Katılın",
        link: "https://www.vetusclub.com.tr"
      },
      {
        title: "Atölye Uygulaması İçin Bir Fikrim Var!",
        text: "VetusClub ile birlikte gelişime önem veriyor, düşüncelerinizi hayata geçiriyoruz.",
        button: "İletişime Geçin",
        link: "https://www.vetusclub.com.tr"
      }
    ];

    const area = document.getElementById("notesArea");

    notes.forEach(note => {
      const el = document.createElement("div");
      const randomDeg = randomRotate();
      const randomH = randomHeight();

      el.className = "note";
      el.style.setProperty("--rotate", `${randomDeg}deg`);
      el.style.height = `${randomH}px`;

      el.innerHTML = `
        <div class="pin ${randomPinColor()}"></div>
        <h2>${note.title}</h2>
        <p>${note.text}</p>
        <a href="${note.link}" class="btn" target="_blank" rel="noopener noreferrer">${note.button}</a>
      `;

      area.appendChild(el);
    });

    document.querySelectorAll(".note").forEach(note => {
      note.addEventListener("mousemove", (e) => {
        if (window.innerWidth <= 768) return;

        const rect = note.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const moveX = (x - rect.width / 2) / 25;
        const moveY = (y - rect.height / 2) / 30;

        note.style.setProperty("--floatX", `${moveX}px`);
        note.style.setProperty("--floatY", `${moveY}px`);
      });

      note.addEventListener("mouseleave", () => {
        note.style.setProperty("--floatX", "0px");
        note.style.setProperty("--floatY", "0px");
      });
    });
  </script>

</body>
</html>
