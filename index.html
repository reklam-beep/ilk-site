<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>İlk Sitem</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #0f0f14; /* koyu arka plan */
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      padding: 24px;
    }

    button {
      background: #0d6efd; /* mavi buton */
      border: none;
      color: #fff;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0b5ed7;
    }

    button:focus {
      outline: 2px solid rgba(13, 110, 253, 0.5);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Merhaba 👋</h1>
    <p>Bu benim ilk web sitem!</p>

    <button type="button">Tıkla</button>
  </div>

</body>
</html>
