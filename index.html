        const isDark = theme === "dark";
        document.body.classList.toggle("dark", isDark);

        }
      ];

      const viewer = document.getElementById("storyViewer");
      const closeBtn = document.getElementById("storyCloseBtn");
      const prevBtn = document.getElementById("storyPrevBtn");
      const nextBtn = document.getElementById("storyNextBtn");
      const storyProgress = document.getElementById("storyProgress");
      const storyFrame = document.getElementById("storyFrame");

      const emojiEl = document.getElementById("storyFrameEmoji");
      const titleEl = document.getElementById("storyFrameTitle");
      const subtitleEl = document.getElementById("storyFrameSubtitle");

      const state = {
        isOpen: false,
        isPaused: false,
        storyIndex: 0,
        frameIndex: 0,
        frameElapsedMs: 0,
        frameStartTs: 0,
        rafId: null
      };

      function setFrameContent() {
        const frame = stories[state.storyIndex].frames[state.frameIndex];
        storyFrame.style.background = frame.bg;
        emojiEl.textContent = frame.emoji;
        titleEl.textContent = frame.title;
        subtitleEl.textContent = frame.subtitle;
      }

      function renderProgress() {
        const frames = stories[state.storyIndex].frames;
        storyProgress.innerHTML = "";
        for (let i = 0; i < frames.length; i++) {
          const seg = document.createElement("div");
          seg.className = "story-segment";

          const bar = document.createElement("span");
          seg.appendChild(bar);

          storyProgress.appendChild(seg);
        }
      }

      function syncProgressStatic() {
        const bars = storyProgress.querySelectorAll(".story-segment > span");
        bars.forEach((bar, i) => {
          if (i < state.frameIndex) bar.style.width = "100%";
          else bar.style.width = "0%";
        });
      }

      function startTimerFromCurrentElapsed() {
        if (state.rafId) cancelAnimationFrame(state.rafId);
        state.frameStartTs = performance.now();

        const tick = () => {
          const elapsedTotal =
            state.frameElapsedMs + (performance.now() - state.frameStartTs);
          const pct = Math.min(1, elapsedTotal / durationMs);

          const bars = storyProgress.querySelectorAll(".story-segment > span");
          if (bars[state.frameIndex]) bars[state.frameIndex].style.width = pct * 100 + "%";

          if (elapsedTotal >= durationMs) {
            state.rafId = null;
            goNext();
            return;
          }

          state.rafId = requestAnimationFrame(tick);
        };

        state.rafId = requestAnimationFrame(tick);
      }

      function openViewer(storyIndex) {
        state.isOpen = true;
        state.isPaused = false;
        state.storyIndex = storyIndex;
        state.frameIndex = 0;
        state.frameElapsedMs = 0;
        state.rafId = null;

        renderProgress();
        setFrameContent();
        syncProgressStatic();
        viewer.classList.add("open");

        document.body.style.overflow = "hidden";
        startTimerFromCurrentElapsed();
      }

      function closeViewer() {
        state.isOpen = false;
        state.isPaused = false;
        if (state.rafId) cancelAnimationFrame(state.rafId);
        state.rafId = null;

        viewer.classList.remove("open");
        document.body.style.overflow = "";
      }

      function setPaused(paused) {
        if (!state.isOpen || state.isPaused === paused) return;
        state.isPaused = paused;

        if (paused) {
          if (state.rafId) cancelAnimationFrame(state.rafId);
          state.rafId = null;
          state.frameElapsedMs =
            state.frameElapsedMs + (performance.now() - state.frameStartTs);
        } else {
          startTimerFromCurrentElapsed();
        }
      }

      function goNext() {
        const frames = stories[state.storyIndex].frames;

        if (state.frameIndex < frames.length - 1) {
          state.frameIndex += 1;
          state.frameElapsedMs = 0;
          syncProgressStatic();
          setFrameContent();
          startTimerFromCurrentElapsed();
          return;
        }

        if (state.storyIndex < stories.length - 1) {
          state.storyIndex += 1;
          state.frameIndex = 0;
          state.frameElapsedMs = 0;
          renderProgress();
          setFrameContent();
          syncProgressStatic();
          startTimerFromCurrentElapsed();
          return;
        }

        closeViewer();
      }

      function goPrev() {
        if (state.frameIndex > 0) {
          state.frameIndex -= 1;
          state.frameElapsedMs = 0;
          syncProgressStatic();
          setFrameContent();
          startTimerFromCurrentElapsed();
          return;
        }

        if (state.storyIndex > 0) {
          state.storyIndex -= 1;
          state.frameIndex = stories[state.storyIndex].frames.length - 1;
          state.frameElapsedMs = 0;
          renderProgress();
          setFrameContent();
          syncProgressStatic();
          startTimerFromCurrentElapsed();
          return;
        }

        // En baştaysak sadece kaldığımız frame'i yeniden oynat.
        state.frameElapsedMs = 0;
        syncProgressStatic();
        setFrameContent();
        startTimerFromCurrentElapsed();
      }

      document.querySelectorAll(".story[data-story-index]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.getAttribute("data-story-index") || "0");
          openViewer(idx);
        });
      });

      closeBtn.addEventListener("click", closeViewer);
      nextBtn.addEventListener("click", () => {
        if (!state.isOpen) return;
        state.isPaused = false;
        state.frameElapsedMs = 0;
        goNext();
      });
      prevBtn.addEventListener("click", () => {
        if (!state.isOpen) return;
        state.isPaused = false;
        state.frameElapsedMs = 0;
        goPrev();
      });

      // Basılı tut = duraklat.
      storyFrame.addEventListener("pointerdown", () => setPaused(true));
      storyFrame.addEventListener("pointerup", () => setPaused(false));
      storyFrame.addEventListener("pointercancel", () => setPaused(false));

      // Esc ile kapat.
      document.addEventListener("keydown", (e) => {
        if (!state.isOpen) return;
        if (e.key === "Escape") closeViewer();
      });

      // Sekme değişince duraklat.
      document.addEventListener("visibilitychange", () => {
        if (!state.isOpen) return;
        setPaused(document.visibilityState !== "visible");
      });

      // Card dışına tıklayınca kapat.
      viewer.addEventListener("click", (e) => {
        if (!state.isOpen) return;
        if (e.target === viewer) closeViewer();
      });
    })();
  </script>
</body>
</html>
